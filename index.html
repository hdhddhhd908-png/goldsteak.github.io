<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLDSTEAK | Официальный сайт</title>
    <style>
        /* Плавный переход при нажатии на кнопки */
        html { scroll-behavior: smooth; }

        body { 
            background-color: #0a0a0a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #ffffff;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- ЛЕВОЕ МЕНЮ --- */
        .sidebar {
            width: 280px;
            background: #111111;
            border-right: 2px solid #ffd700;
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            z-index: 100;
        }

        .logo {
            color: #ffd700;
            font-size: 2.2em;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 50px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .nav-btn {
            display: block;
            padding: 16px;
            margin-bottom: 15px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            border-radius: 15px;
            transition: 0.4s;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
        }

        /* Кнопка Дискорд */
        .btn-discord {
            background-color: #5865F2;
            color: white;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }
        .btn-discord:hover {
            background-color: #4752c4;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(88, 101, 242, 0.5);
        }

        /* Кнопка ТАП (Перемещение) */
        .btn-tap {
            background-color: transparent;
            color: #ffd700;
            border: 2px solid #ffd700;
        }
        .btn-tap:hover {
            background-color: #ffd700;
            color: #000;
            transform: translateY(-3px);
        }

        /* --- КОНТЕНТ СПРАВА --- */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 80px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .welcome-box {
            max-width: 800px;
            margin-bottom: 100px;
        }

        h1 { font-size: 4em; margin: 0; line-height: 1.1; }
        .gold { color: #ffd700; }

        /* Секция с анкетой */
        .anketa-box {
            background: #151515;
            padding: 60px 40px;
            border-radius: 40px;
            border: 1px solid #333;
            width: 100%;
            max-width: 650px;
            transition: 0.3s;
        }
        .anketa-box:hover { border-color: #ffd700; }

        .big-action-btn {
            background: #ffd700;
            color: #000;
            padding: 22px 60px;
            font-size: 1.5em;
            font-weight: 800;
            text-decoration: none;
            border-radius: 60px;
            display: inline-block;
            margin-top: 30px;
            transition: 0.5s;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        .big-action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
        }

        /* Мобильная версия */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 2px solid #ffd700; padding: 20px; }
            .main-content { margin-left: 0; padding: 40px 20px; }
            h1 { font-size: 2.5em; }
        }
    </style>
</head>
<body>

    <!-- ЛЕВОЕ МЕНЮ -->
    <div class="sidebar">
        <div class="logo">GOLDSTEAK</div>
        
        <!-- Ссылка на Discord -->
        <a href="https://discord.gg" target="_blank" class="nav-btn btn-discord">
            Наш Discord
        </a>

        <!-- Кнопка ТАП -->
        <a href="#anketa-area" class="nav-btn btn-tap">
            Заполнить анкету
        </a>

        <div style="margin-top: auto; font-size: 0.7em; color: #444; text-align: center;">
            © 2024 GOLDSTEAK SYSTEM
        </div>
    </div>

    <!-- КОНТЕНТ -->
    <div class="main-content">
        
        <div class="welcome-box">
            <h1>WELCOME TO <br><span class="gold">GOLDSTEAK</span></h1>
            <p style="color: #666; font-size: 1.3em; margin-top: 20px;">Пожалуйста, ответьте на наши вопросы.</p>
        </div>

        <!-- ЯКОРЬ ДЛЯ ТАПА -->
        <div id="anketa-area" class="anketa-box">
            <h2 class="gold" style="font-size: 2em; margin-bottom: 15px;">АНКЕТА</h2>
            <p style="color: #bbb;">Нажмите на золотую кнопку ниже, чтобы открыть новую анкету GOLDSTEAK.</p>
            
            <!-- Твоя новая ссылка на Google Форму -->
            <a href="https://google.com" target="_blank" class="big-action-btn">
                Открыть вопросы
            </a>
        </div>

    </div>

</body>
</html>
