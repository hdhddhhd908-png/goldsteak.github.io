<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLDSTEAK | Community</title>
    <style>
        /* Плавная прокрутка */
        html { scroll-behavior: smooth; }

        body { 
            background-color: #0a0a0a; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            color: white;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- ЛЕВОЕ МЕНЮ --- */
        .sidebar {
            width: 280px;
            background: #111111;
            border-right: 2px solid #ffd700;
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            z-index: 100;
        }

        .logo {
            color: #ffd700;
            font-size: 2.2em;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 50px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .nav-btn {
            display: block;
            padding: 16px;
            margin-bottom: 15px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            border-radius: 12px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.85em;
        }

        /* Кнопка Дискорд */
        .btn-discord {
            background-color: #5865F2;
            color: white;
        }
        .btn-discord:hover {
            background-color: #4752c4;
            transform: translateY(-3px);
        }

        /* Кнопка ТАП */
        .btn-tap {
            background-color: transparent;
            color: #ffd700;
            border: 2px solid #ffd700;
        }
        .btn-tap:hover {
            background-color: #ffd700;
            color: black;
            transform: translateY(-3px);
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 80px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 { font-size: 4em; margin-bottom: 20px; }
        .gold { color: #ffd700; }

        .anketa-box {
            background: #151515;
            padding: 50px;
            border-radius: 40px;
            border: 1px solid #333;
            width: 100%;
            max-width: 600px;
            margin-top: 50px;
        }

        .big-action-btn {
            background: #ffd700;
            color: black;
            padding: 20px 50px;
            font-size: 1.4em;
            font-weight: 800;
            text-decoration: none;
            border-radius: 50px;
            display: inline-block;
            margin-top: 25px;
            transition: 0.4s;
            text-transform: uppercase;
        }
        .big-action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        /* Мобильная адаптация */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 2px solid #ffd700; }
            .main-content { margin-left: 0; padding: 40px 20px; }
            h1 { font-size: 2.5em; }
        }
    </style>
</head>
<body>

    <!-- МЕНЮ СЛЕВА -->
    <div class="sidebar">
        <div class="logo">GOLDSTEAK</div>
        
        <!-- Кнопка Discord -->
        <a href="https://discord.gg/p43nyuhBfT" target="_blank" class="nav-btn btn-discord">
            Наш Discord
        </a>

        <!-- Кнопка ТАП -->
        <a href="#anketa-section" class="nav-btn btn-tap">
            Заполнить анкету
        </a>

        <div style="margin-top: auto; font-size: 0.7em; color: #444; text-align: center;">
            © 2024 GOLDSTEAK
        </div>
    </div>

    <!-- КОНТЕНТ -->
    <div class="main-content">
        
        <h1>WELCOME TO <br><span class="gold">GOLDSTEAK</span></h1>

        <!-- ЯКОРЬ ДЛЯ ТАПА -->
        <div id="anketa-section" class="anketa-box">
            <h2 class="gold">АНКЕТА УЧАСТНИКА</h2>
            <p>Нажмите ниже, чтобы открыть вопросы в новой вкладке.</p>
            
            <!-- Ссылка на Google Форму -->
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSe7jUSfP8J3ofsvTxZ_bhOVBwV7OfXUI3u_7voGdQVumiWTjg/viewform?usp=publish-editor" target="_blank" class="big-action-btn">
                Открыть анкету
            </a>
        </div>

    </div>

</body>
</html>
